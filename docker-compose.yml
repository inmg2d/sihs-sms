services:
  mysql:
    image: mysql:8
    container_name: sihs_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: sihs
      MYSQL_USER: sihs
      MYSQL_PASSWORD: sihs123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
